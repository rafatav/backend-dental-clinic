name: dental-clinic
services:
  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=dental_clinic_db
    volumes:
      - dental_clinic_db_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    ports:
      - '8888:80'
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=123456
    depends_on:
      - postgres

volumes:
  dental_clinic_db_pg_data:
